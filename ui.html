<!DOCTYPE html>
<html>
<head>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Inter, system-ui, sans-serif;
      font-size: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      height: 100vh;
    }

    button {
      background: #18a0fb;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
    }

    button:hover {
      background: #0d8de5;
    }

    button.cancel {
      background: #f24822;
    }

    button.cancel:hover {
      background: #d93d1a;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    button.confirm {
      background: #1a9645;
    }

    button.confirm:hover {
      background: #157a38;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 6px;
    }

    .tab-btn {
      background: transparent;
      color: #999;
      border: 1.5px solid #ccc;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .tab-btn:hover {
      color: #555;
      border-color: #aaa;
      background: #f5f5f5;
    }

    .tab-btn.active {
      color: #18a0fb;
      border-color: #18a0fb;
      background: transparent;
    }

    .tab-btn.active:hover {
      background: rgba(24, 160, 251, 0.05);
    }

    .tab-content {
      display: none;
      flex-direction: column;
      gap: 12px;
      flex-shrink: 0;
    }

    .tab-content.active {
      display: flex;
    }

    .action-row {
      display: flex;
      gap: 8px;
    }

    .action-row button:first-child {
      flex: 1;
    }

    #secondaryBtn {
      background: transparent;
      color: #999;
      border: 1px solid #ddd;
      padding: 10px 12px;
      white-space: nowrap;
    }

    #secondaryBtn:hover {
      background: #f5f5f5;
      color: #333;
    }

    .settings {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .settings-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .settings label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #333;
    }

    .settings input[type="text"] {
      width: 60px;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
      text-align: center;
    }

    /* Separator */
    .separator {
      border: none;
      border-top: 2px dotted #ccc;
      margin: 0;
    }

    /* Page & selection info bar */
    .info-bar {
      font-size: 11px;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 10px 0;
      flex-shrink: 0;
    }

    .info-bar span {
      color: #333;
    }

    .log-container {
      position: relative;
      flex: 1;
      min-height: 0;
    }

    .log {
      height: 100%;
      background: #1e1e1e;
      color: #d4d4d4;
      border-radius: 6px;
      padding: 12px;
      padding-right: 16px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 11px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      box-sizing: border-box;
    }

    .log::-webkit-scrollbar {
      width: 6px;
    }

    .log::-webkit-scrollbar-track {
      background: transparent;
    }

    .log::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 3px;
    }

    .log::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.4);
    }

    .log-btns {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      gap: 4px;
    }

    .log-btn {
      width: 22px;
      height: 22px;
      border: none;
      border-radius: 4px;
      background: rgba(255,255,255,0.1);
      color: #18a0fb;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
      transition: background 0.15s, color 0.15s;
    }

    .log-btn:hover {
      background: rgba(255,255,255,0.18);
    }

    .log-btn.paused {
      color: #555;
    }

    .log-btn-clear {
      color: #888;
      font-size: 12px;
    }

    .log-entry {
      margin-bottom: 4px;
    }

    .log-entry.success { color: #4ec9b0; }
    .log-entry.error { color: #f14c4c; }
    .log-entry.info { color: #9cdcfe; }
    .log-entry.warn { color: #dcdcaa; }

    .progress {
      height: 4px;
      background: #e5e5e5;
      border-radius: 2px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .progress-bar {
      height: 100%;
      background: #18a0fb;
      width: 0%;
      transition: width 0.2s;
    }

    input[type="file"] {
      display: none;
    }

    .stats {
      font-size: 11px;
      color: #666;
      flex-shrink: 0;
      margin-top: 6px;
      margin-bottom: 4px;
      font-family: 'SF Mono', Monaco, monospace;
    }

    .hint {
      font-size: 10px;
      color: #999;
    }

    .preview {
      background: #f5f5f5;
      border-radius: 4px;
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      grid-auto-rows: 18px;
      align-items: center;
      gap: 6px 8px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 10px;
      line-height: 1;
    }

    .preview-row {
      display: contents;
    }

    .preview-input { color: #888; }
    .preview-arrow { color: #bbb; text-align: center; }
    .preview-output { color: #333; }
    .preview-output.changed { color: #18a0fb; }

    .utils-section {
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 14px 12px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .utils-section legend {
      font-size: 12px;
      font-weight: 600;
      color: #333;
      padding: 0 5px;
    }

    select {
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
      background: white;
      cursor: pointer;
    }

    #constraintCancelBtn {
      background: transparent;
      color: #999;
      border: 1px solid #ddd;
      padding: 10px 12px;
      white-space: nowrap;
      flex: 0 0 30%;
    }

    #constraintCancelBtn:hover {
      background: #f5f5f5;
      color: #333;
    }

    .bottom-section {
      display: flex;
      flex-direction: column;
      gap: 0;
      flex: 1;
      min-height: 0;
      background: #f0f0f0;
      margin: 0 -16px -16px -16px;
      padding: 10px 16px 16px 16px;
      border-top: 2px dotted #ccc;
    }
  </style>
</head>
<body>
  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="importer">Icon Importer</button>
    <button class="tab-btn" data-tab="utils">Utils</button>
  </div>

  <!-- Tab: Icon Importer -->
  <div class="tab-content active" id="tab-importer">
    <div class="settings">
      <div class="settings-row">
        <label>
          Separator:
          <input type="text" id="separator" value="_">
        </label>
        <span class="hint" id="formatHint"></span>
      </div>
      <label class="settings-row">
        <input type="checkbox" id="parseEmojiNames">
        Parse emoji names
      </label>
      <label class="settings-row">
        <input type="checkbox" id="detectOffPattern">
        Detect on/off variants
      </label>
      <label class="settings-row">
        <input type="checkbox" id="retinaMode" checked>
        Retina @2x (halve dimensions)
      </label>
      <div class="preview">
        <div class="preview-row">
          <span id="previewEmojiInput" class="preview-input"></span>
          <span class="preview-arrow">→</span>
          <span id="previewEmojiOutput" class="preview-output"></span>
        </div>
        <div class="preview-row">
          <span id="previewOffInput" class="preview-input"></span>
          <span class="preview-arrow">→</span>
          <span id="previewOffOutput" class="preview-output"></span>
        </div>
      </div>
    </div>

    <div class="action-row">
      <button id="actionBtn">📁 Select folder with icons</button>
      <button id="secondaryBtn" style="display:none">✕ Change folder</button>
    </div>
    <input type="file" id="fileInput" webkitdirectory multiple accept="image/png">
  </div>

  <!-- Tab: Utils -->
  <div class="tab-content" id="tab-utils">
    <fieldset class="utils-section">
      <legend>Mass Constraints Edit</legend>
      <div class="settings">
        <div class="settings-row">
          <label>X:
            <select id="constraintX">
              <option value="MIN">Left</option>
              <option value="MAX">Right</option>
              <option value="STRETCH">Left + Right</option>
              <option value="CENTER">Center</option>
              <option value="SCALE">Scale</option>
            </select>
          </label>
          <label>Y:
            <select id="constraintY">
              <option value="MIN">Top</option>
              <option value="MAX">Bottom</option>
              <option value="STRETCH">Top + Bottom</option>
              <option value="CENTER">Center</option>
              <option value="SCALE">Scale</option>
            </select>
          </label>
        </div>
      </div>
      <div class="action-row">
        <button id="constraintActionBtn">Preview</button>
        <button id="constraintCancelBtn" style="display:none">Cancel</button>
      </div>
    </fieldset>
  </div>

  <!-- Shared bottom section -->
  <div class="bottom-section">
    <div class="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="stats" id="stats">Waiting for command</div>
    <div class="info-bar">
      Page: <span id="pageName">—</span>, selected: <span id="selectionInfo">0</span>
    </div>
    <div class="log-container">
      <div class="log" id="log"></div>
      <div class="log-btns">
        <button class="log-btn log-btn-clear" id="clearLogBtn" title="Clear log">✕</button>
        <button class="log-btn" id="scrollBtn" title="Auto-scroll">↓</button>
      </div>
    </div>
  </div>

  <script>
    const EMOJI_NAMES = {"1F192":"Cool Button","1F31A":"New Moon Face","1F32D":"Hot Dog","1F34C":"Banana","1F353":"Strawberry","1F37E":"Bottle With Popping Cork","1F383":"Jack-O-Lantern","1F384":"Christmas Tree","1F385":"Santa Claus","1F389":"Party Popper","1F3C6":"Trophy","1F433":"Spouting Whale","1F440":"Eyes","1F44C":"Ok Hand","1F44D":"Thumbs Up","1F44E":"Thumbs Down","1F44F":"Clapping Hands","1F468-200D-1F4BB":"Man Technologist","1F47B":"Ghost","1F47E":"Alien Monster","1F485":"Nail Polish","1F48A":"Pill","1F48B":"Kiss Mark","1F494":"Broken Heart","1F498":"Heart With Arrow","1F4A9":"Pile Of Poo","1F4AF":"Hundred Points","1F525":"Fire","1F54A-FE0F":"Dove","1F595":"Middle Finger","1F5FF":"Moai","1F601":"Beaming Face With Smiling Eyes","1F602":"Face With Tears Of Joy","1F607":"Smiling Face With Halo","1F608":"Smiling Face With Horns","1F60D":"Smiling Face With Heart-Eyes","1F60E":"Smiling Face With Sunglasses","1F610":"Neutral Face","1F618":"Face Blowing A Kiss","1F621":"Enraged Face","1F622":"Crying Face","1F628":"Fearful Face","1F62D":"Loudly Crying Face","1F631":"Face Screaming In Fear","1F634":"Sleeping Face","1F648":"See-No-Evil Monkey","1F649":"Hear-No-Evil Monkey","1F64A":"Speak-No-Evil Monkey","1F64F":"Folded Hands","1F913":"Nerd Face","1F914":"Thinking Face","1F917":"Smiling Face With Open Hands","1F91D":"Handshake","1F921":"Clown Face","1F923":"Rolling On The Floor Laughing","1F928":"Face With Raised Eyebrow","1F929":"Star-Struck","1F92A":"Zany Face","1F92C":"Face With Symbols On Mouth","1F92E":"Face Vomiting","1F92F":"Exploding Head","1F937":"Person Shrugging","1F970":"Smiling Face With Hearts","1F971":"Yawning Face","1F974":"Woozy Face","1F984":"Unicorn","1FAE1":"Saluting Face","2603-FE0F":"Snowman","26A1":"High Voltage","270D-FE0F":"Writing Hand","2764-FE0F":"Red Heart","2764-FE0F-200D-1F525":"Heart On Fire"};

    // Tab switching
    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabContents = document.querySelectorAll('.tab-content');

    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.dataset.tab;
        tabBtns.forEach(b => b.classList.remove('active'));
        tabContents.forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + target).classList.add('active');
        resetAllState();
      });
    });

    const actionBtn = document.getElementById('actionBtn');
    const fileInput = document.getElementById('fileInput');
    const logEl = document.getElementById('log');
    const progressBar = document.getElementById('progressBar');
    const statsEl = document.getElementById('stats');
    const separatorInput = document.getElementById('separator');
    const formatHint = document.getElementById('formatHint');
    const scrollBtn = document.getElementById('scrollBtn');
    const clearLogBtn = document.getElementById('clearLogBtn');
    const parseEmojiCheck = document.getElementById('parseEmojiNames');
    const detectOffCheck = document.getElementById('detectOffPattern');
    const retinaModeCheck = document.getElementById('retinaMode');
    const selectionInfoEl = document.getElementById('selectionInfo');
    const constraintActionBtn = document.getElementById('constraintActionBtn');
    const constraintCancelBtn = document.getElementById('constraintCancelBtn');
    const constraintXSel = document.getElementById('constraintX');
    const constraintYSel = document.getElementById('constraintY');
    let utilsState = 'idle'; // 'idle' | 'preview' | 'applying'

    let autoScroll = true;

    clearLogBtn.addEventListener('click', () => {
      logEl.innerHTML = '';
    });

    scrollBtn.addEventListener('click', () => {
      autoScroll = !autoScroll;
      scrollBtn.classList.toggle('paused', !autoScroll);
      if (autoScroll) logEl.scrollTop = logEl.scrollHeight;
    });

    function updateFormatHint() {
      const sep = separatorInput.value || '_';
      formatHint.textContent = `[category]${sep}[name]${sep}[theme]${sep}[state].png`;
    }
    function capitalize(str) {
      const cp = [...str];
      if (!cp.length) return str;
      return cp[0].toUpperCase() + cp.slice(1).join('').toLowerCase();
    }

    function updatePreview() {
      const sep = separatorInput.value || '_';
      const parseEmoji = parseEmojiCheck.checked;
      const detectOff = detectOffCheck.checked;

      // Emoji example
      const emojiName = '1F600';
      document.getElementById('previewEmojiInput').textContent = `emoji${sep}${emojiName}${sep}light${sep}default.png`;
      let emojiDisplay = emojiName;
      let emojiChanged = false;
      if (parseEmoji) {
        const parsed = parseEmojiFromName(emojiName);
        if (parsed) {
          emojiDisplay = parsed.name ? `${parsed.emoji} ${parsed.name} (${emojiName})` : `${parsed.emoji} ${emojiName}`;
          emojiChanged = true;
        }
      }
      const emojiOutputEl = document.getElementById('previewEmojiOutput');
      emojiOutputEl.textContent = `Icon / Emoji / ${capitalize(emojiDisplay)}`;
      emojiOutputEl.className = 'preview-output' + (emojiChanged ? ' changed' : '');

      // On/off example
      document.getElementById('previewOffInput').textContent = `ico${sep}heart_off${sep}light${sep}default.png`;
      const offOutputEl = document.getElementById('previewOffOutput');
      if (detectOff) {
        offOutputEl.textContent = 'Icon / Ico / Heart  (state=on, state=off)';
        offOutputEl.className = 'preview-output changed';
      } else {
        offOutputEl.textContent = 'Icon / Ico / Heart_off';
        offOutputEl.className = 'preview-output';
      }
    }

    function updateSeparatorState() {
      updateFormatHint();
      updatePreview();
      if (appState === 'idle') actionBtn.disabled = separatorInput.value.trim() === '';
    }
    separatorInput.addEventListener('input', updateSeparatorState);
    parseEmojiCheck.addEventListener('change', updatePreview);
    detectOffCheck.addEventListener('change', updatePreview);
    updateFormatHint();
    updatePreview();

    let appState = 'idle'; // 'idle' | 'preview' | 'processing'
    let pendingImport = null;
    let isCancelled = false;

    const secondaryBtn = document.getElementById('secondaryBtn');

    function setAppState(state) {
      appState = state;
      const inIdle = state === 'idle';
      const inPreview = state === 'preview';
      const inProcessing = state === 'processing';

      separatorInput.disabled = !inIdle;
      parseEmojiCheck.disabled = !inIdle;
      detectOffCheck.disabled = !inIdle;
      retinaModeCheck.disabled = !inIdle;

      // Block tabs during processing
      tabBtns.forEach(btn => {
        btn.disabled = inProcessing;
        if (inProcessing) {
          btn.style.pointerEvents = 'none';
          btn.style.opacity = '0.5';
        } else {
          btn.style.pointerEvents = '';
          btn.style.opacity = '';
        }
      });

      if (inIdle) {
        actionBtn.disabled = separatorInput.value.trim() === '';
        actionBtn.textContent = '📁 Select folder with icons';
        actionBtn.className = '';
        secondaryBtn.style.display = 'none';
        setProgress(0);
      } else if (inPreview) {
        actionBtn.disabled = false;
        actionBtn.textContent = `✅ Confirm import (${pendingImport.totalIcons} icons)`;
        actionBtn.className = 'confirm';
        secondaryBtn.style.display = '';
      } else {
        actionBtn.disabled = false;
        actionBtn.textContent = '⛔ Cancel';
        actionBtn.className = 'cancel';
        secondaryBtn.style.display = 'none';
      }
    }

    secondaryBtn.addEventListener('click', () => {
      pendingImport = null;
      setAppState('idle');
      fileInput.value = '';
      log('Folder deselected. Select a new folder to start.', 'info');
    });

    // Utils state management
    function setUtilsState(state) {
      utilsState = state;
      constraintXSel.disabled = state !== 'idle';
      constraintYSel.disabled = state !== 'idle';

      const isApplying = state === 'applying';
      tabBtns.forEach(btn => {
        btn.disabled = isApplying;
        btn.style.pointerEvents = isApplying ? 'none' : '';
        btn.style.opacity = isApplying ? '0.5' : '';
      });

      if (state === 'idle') {
        constraintActionBtn.textContent = 'Preview';
        constraintActionBtn.className = '';
        constraintActionBtn.disabled = false;
        constraintCancelBtn.style.display = 'none';
        setProgress(0);
      } else if (state === 'preview') {
        constraintActionBtn.className = 'confirm';
        constraintActionBtn.disabled = false;
        constraintCancelBtn.style.display = '';
      } else if (state === 'applying') {
        constraintActionBtn.textContent = 'In Progress...';
        constraintActionBtn.className = '';
        constraintActionBtn.disabled = true;
        constraintCancelBtn.style.display = 'none';
      }
    }

    function resetAllState() {
      // Reset importer
      pendingImport = null;
      isCancelled = true;
      setAppState('idle');
      fileInput.value = '';

      // Reset utils
      utilsState = 'idle';
      constraintActionBtn.textContent = 'Preview';
      constraintActionBtn.className = '';
      constraintActionBtn.disabled = false;
      constraintCancelBtn.style.display = 'none';
      constraintXSel.disabled = false;
      constraintYSel.disabled = false;
      constraintXSel.value = 'MIN';
      constraintYSel.value = 'MIN';
      parent.postMessage({ pluginMessage: { type: 'cancel-constraints' } }, '*');

      // Unblock tabs
      tabBtns.forEach(btn => {
        btn.disabled = false;
        btn.style.pointerEvents = '';
        btn.style.opacity = '';
      });
    }

    constraintActionBtn.addEventListener('click', () => {
      if (utilsState === 'idle') {
        parent.postMessage({
          pluginMessage: { type: 'preview-constraints' }
        }, '*');
      } else if (utilsState === 'preview') {
        setUtilsState('applying');
        parent.postMessage({
          pluginMessage: {
            type: 'apply-constraints',
            x: constraintXSel.value,
            y: constraintYSel.value
          }
        }, '*');
      }
    });

    constraintCancelBtn.addEventListener('click', () => {
      setUtilsState('idle');
      parent.postMessage({ pluginMessage: { type: 'cancel-constraints' } }, '*');
      log('Cancelled', 'info');
    });

    // Format time in 24h format
    function formatTime() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      return `${h}:${m}:${s}`;
    }

    function log(message, type = '') {
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = `[${formatTime()}] ${message}`;
      logEl.appendChild(entry);
      if (autoScroll) logEl.scrollTop = logEl.scrollHeight;
    }

    function setProgress(percent) {
      progressBar.style.width = `${percent}%`;
    }

    function setStats(text) {
      statsEl.textContent = text;
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }


    function parseEmojiFromName(name) {
      try {
        const parts = name.split('-');
        if (parts.some(p => p.length < 4 || !/^[0-9a-fA-F]+$/.test(p))) return null;
        const codePoints = parts.map(p => parseInt(p, 16));
        if (codePoints.some(cp => cp > 0x10FFFF)) return null;
        const emoji = String.fromCodePoint(...codePoints);

        // Lookup name: try exact key, then strip FE0F/skin tones
        const upper = name.toUpperCase();
        const skinTones = ['1F3FB','1F3FC','1F3FD','1F3FE','1F3FF'];
        let emojiName = EMOJI_NAMES[upper]
          || EMOJI_NAMES[upper.split('-').filter(p => p !== 'FE0F').join('-')]
          || EMOJI_NAMES[upper.split('-').filter(p => !skinTones.includes(p) && p !== 'FE0F' && p !== '200D').join('-')]
          || null;

        return { emoji, name: emojiName };
      } catch (e) {
        return null;
      }
    }

    function parseName(filename, sep) {
      const base = filename.slice(0, -4); // remove .png
      const parts = base.split(sep);
      if (parts.length !== 4) return null;
      const [category, name, theme, state] = parts;
      return { category, name, theme, state };
    }

    actionBtn.addEventListener('click', () => {
      if (appState === 'processing') {
        isCancelled = true;
        log('⛔ Cancelling operation...', 'warn');
      } else if (appState === 'preview') {
        startImport(pendingImport);
      } else {
        fileInput.click();
      }
    });

    // Parse phase — only filename grouping, no file reading
    fileInput.addEventListener('change', (e) => {
      const files = Array.from(e.target.files).filter(f => f.name.toLowerCase().endsWith('.png'));
      const separator = separatorInput.value || '_';
      const parseEmojiNamesOpt = parseEmojiCheck.checked;
      const detectOffPatternOpt = detectOffCheck.checked;

      if (files.length === 0) {
        log('No PNG files found', 'error');
        return;
      }

      log(`\n📁 Found ${files.length} PNG files (separator: "${separator}")`, 'info');

      const groups = {};
      const parsedFiles = [];
      let invalidCount = 0;

      for (const file of files) {
        const parsed = parseName(file.name, separator);
        if (!parsed) { invalidCount++; continue; }

        let { category, name, theme, state } = parsed;
        let isOffVariant = false;
        let baseName = name;

        if (detectOffPatternOpt && name.endsWith('_off')) {
          isOffVariant = true;
          baseName = name.slice(0, -4);
        }
        if (parseEmojiNamesOpt) {
          const parsed = parseEmojiFromName(baseName);
          if (parsed) baseName = parsed.name ? `${parsed.emoji} ${parsed.name} (${baseName})` : `${parsed.emoji} ${baseName}`;
        }

        parsedFiles.push({ file, category, name, baseName, theme, state, isOffVariant });
      }

      if (invalidCount > 0) {
        log(`⚠️ Skipped ${invalidCount} files (invalid name format)`, 'warn');
      }

      // Build a Set of "on" variant keys for O(1) lookup
      const onVariantKeys = new Set();
      for (const pf of parsedFiles) {
        if (!pf.isOffVariant) {
          onVariantKeys.add(`${pf.category}\0${pf.baseName}\0${pf.theme}`);
        }
      }
      const offPatternGroups = new Set();
      for (const pf of parsedFiles) {
        if (pf.isOffVariant && onVariantKeys.has(`${pf.category}\0${pf.baseName}\0${pf.theme}`)) {
          offPatternGroups.add(`${pf.category}${separator}${pf.baseName}`);
        }
      }

      if (detectOffPatternOpt && offPatternGroups.size > 0) {
        log(`Found ${offPatternGroups.size} icon groups using on/off pattern`, 'info');
      }

      for (const pf of parsedFiles) {
        const groupKey = `${pf.category}${separator}${pf.baseName}`;
        const usesOffPattern = offPatternGroups.has(groupKey);

        let effectiveName = pf.baseName;
        let effectiveState = pf.state;

        if (usesOffPattern) {
          if (pf.theme !== 'light') continue;
          effectiveState = pf.isOffVariant ? 'off' : 'on';
        } else if (pf.isOffVariant) {
          effectiveName = pf.name;
        }

        const actualGroupKey = `${pf.category}${separator}${effectiveName}`;
        if (!groups[actualGroupKey]) {
          groups[actualGroupKey] = {
            category: pf.category, name: effectiveName,
            themes: new Set(), states: new Set(), files: {}, usesOffPattern
          };
        }
        if (!usesOffPattern) groups[actualGroupKey].themes.add(pf.theme);
        groups[actualGroupKey].states.add(effectiveState);
        groups[actualGroupKey].files[`${pf.theme}${separator}${effectiveState}`] = pf.file;
      }

      const categories = {};
      for (const [, group] of Object.entries(groups)) {
        if (!categories[group.category]) categories[group.category] = [];
        categories[group.category].push({ ...group });
      }

      const categoryNames = Object.keys(categories);
      const totalIcons = Object.keys(groups).length;

      log(`Grouped into ${totalIcons} icons across ${categoryNames.length} categories:`, 'info');
      for (const catName of categoryNames) {
        log(`  📂 ${catName}: ${categories[catName].length} icons`, 'info');
      }

      setStats(`Ready: ${totalIcons} icons across ${categoryNames.length} categories`);
      pendingImport = { groups, categories, categoryNames, totalIcons, totalFiles: files.length, separator, retinaMode: retinaModeCheck.checked };
      setAppState('preview');
      fileInput.value = '';
    });

    // Import phase — reads file bytes and creates Figma components
    async function startImport(pending) {
      const { groups, categories, categoryNames, totalIcons, totalFiles, separator, retinaMode } = pending;
      const scaleFactor = retinaMode ? 2 : 1;
      pendingImport = null;
      setAppState('processing');
      isCancelled = false;

      log(`\n▶ Starting import of ${totalIcons} icons...`, 'info');

      await rescanComponents();

      let processed = 0;
      let processedFiles = 0;
      let errorCount = 0;
      let skippedCount = 0;
      let createdCount = 0;
      let currentY = 0;

      function updateStats() {
        setStats(`Files processed: ${processedFiles}/${totalFiles} (errors: ${errorCount}), new icons: ${createdCount}, skipped: ${skippedCount}`);
      }
      updateStats();

      for (const categoryName of categoryNames) {
        if (isCancelled) break;

        const categoryGroups = categories[categoryName];

        log(`\n📂 Category: ${categoryName}`, 'info');

        // Sub-group by variant signature (same themes + states → same row)
        const rowMap = {};
        for (const group of categoryGroups) {
          const themes = Array.from(group.themes).sort().join(',');
          const states = Array.from(group.states).sort().join(',');
          const sig = `${themes}|${states}`;
          if (!rowMap[sig]) rowMap[sig] = [];
          rowMap[sig].push(group);
        }

        for (const rowGroups of Object.values(rowMap)) {
        let currentX = 0;
        let maxHeightInRow = 0;

        for (const group of rowGroups) {
          if (isCancelled) break;

          log(`\n📦 Processing: ${group.category} / ${group.name}`, 'info');

          const themes = Array.from(group.themes).sort();
          const states = Array.from(group.states).sort();
          const onlyDefaultState = states.length === 1 && states[0] === 'default';
          const effectiveStates = onlyDefaultState ? [] : states;
          const noThemes = group.usesOffPattern;

          log(`  Themes: ${noThemes ? '(none - using light only)' : themes.join(', ')}`, 'info');
          log(`  States: ${effectiveStates.length > 0 ? effectiveStates.join(', ') : '(none - only default)'}`, 'info');
          if (group.usesOffPattern) log(`  Using on/off pattern (light theme only, no theme property)`, 'info');

          const variantsData = [];
          let iconWidth = 16;
          let iconHeight = 16;
          let hasProblems = false;

          const effectiveThemes = noThemes ? ['light'] : themes;
          let sizeDetected = false;
          for (const theme of effectiveThemes) {
            if (sizeDetected) break;
            for (const state of states) {
              const file = group.files[`${theme}${separator}${state}`];
              if (file) {
                try {
                  const dimensions = await getImageDimensions(file);
                  iconWidth = dimensions.width / scaleFactor;
                  iconHeight = dimensions.height / scaleFactor;
                  sizeDetected = true;
                  break;
                } catch (e) {}
              }
            }
          }

          for (const theme of effectiveThemes) {
            for (const state of states) {
              const file = group.files[`${theme}${separator}${state}`];
              if (file) {
                try {
                  const bytes = await readFileAsBytes(file);
                  const dimensions = await getImageDimensions(file);
                  variantsData.push({ theme, state, bytes: Array.from(bytes), width: dimensions.width, height: dimensions.height, displayWidth: dimensions.width / scaleFactor, displayHeight: dimensions.height / scaleFactor, isMissing: false });
                  processedFiles++;
                  log(`  ✓ ${theme}/${state} (${dimensions.width}x${dimensions.height})`, 'success');
                } catch (err) {
                  errorCount++;
                  hasProblems = true;
                  log(`  ✗ Error reading ${file.name}: ${err.message}`, 'error');
                  variantsData.push({ theme, state, isMissing: true, width: iconWidth * scaleFactor, height: iconHeight * scaleFactor, displayWidth: iconWidth, displayHeight: iconHeight });
                }
              } else {
                hasProblems = true;
                log(`  ⚠️ Missing: ${theme}/${state} — placeholder will be created`, 'warn');
                variantsData.push({ theme, state, isMissing: true, width: iconWidth * scaleFactor, height: iconHeight * scaleFactor, displayWidth: iconWidth, displayHeight: iconHeight });
              }
              updateStats();
            }
          }

          if (variantsData.length > 0) {
            parent.postMessage({
              pluginMessage: {
                type: 'create-icon',
                category: group.category, name: group.name,
                themes: noThemes ? [] : themes, states: effectiveStates,
                variants: variantsData, position: { x: currentX, y: currentY },
                hasProblems, iconWidth, iconHeight, onlyDefaultState, noThemes
              }
            }, '*');

            const componentResult = await waitForComponentCreated();
            if (componentResult.skipped) {
              skippedCount++;
            } else {
              createdCount++;
              currentX += componentResult.width + 40;
              maxHeightInRow = Math.max(maxHeightInRow, componentResult.height);
              // Wrap row at 3000px width
              if (currentX > 3000) {
                currentY += maxHeightInRow + 40;
                currentX = 0;
                maxHeightInRow = 0;
              }
            }
          }

          processed++;
          setProgress((processed / totalIcons) * 100);
          updateStats();

          if (!isCancelled && processed < totalIcons) {
            log(`  ⏳ Pause 500ms...`, 'info');
            await sleep(500);
          }
        }

        currentY += maxHeightInRow + 40;
        }
      }

      if (isCancelled) {
        log(`\n⛔ Operation cancelled. Processed ${processed} of ${totalIcons}`, 'warn');
      } else {
        log(`\n✅ Done! Created: ${createdCount}, skipped (already exist): ${skippedCount}`, 'success');
      }

      updateStats();
      setAppState('idle');
    }

    function readFileAsBytes(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(new Uint8Array(reader.result));
        reader.onerror = () => reject(new Error(`FileReader error: ${reader.error?.message || 'unknown'}`));
        reader.readAsArrayBuffer(file);
      });
    }

    function getImageDimensions(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          resolve({ width: img.width, height: img.height });
          URL.revokeObjectURL(img.src);
        };
        img.onerror = () => reject(new Error('Image decode failed'));
        img.src = URL.createObjectURL(file);
      });
    }

    // Promise for waiting component creation
    let componentCreatedResolve = null;

    function waitForComponentCreated() {
      return new Promise(resolve => {
        componentCreatedResolve = resolve;
      });
    }

    let rescanDoneResolve = null;

    function rescanComponents() {
      parent.postMessage({ pluginMessage: { type: 'rescan-components' } }, '*');
      return new Promise(resolve => { rescanDoneResolve = resolve; });
    }

    // Messages from plugin
    window.onmessage = (e) => {
      const msg = e.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'page-info') {
        document.getElementById('pageName').textContent = msg.name;
      } else if (msg.type === 'selection-info') {
        if (msg.count === 0) {
          selectionInfoEl.textContent = '0';
        } else {
          selectionInfoEl.textContent = `${msg.count} (${msg.names.join(', ')})`;
        }
      } else if (msg.type === 'log') {
        log(msg.message, msg.level || '');
      } else if (msg.type === 'rescan-done') {
        if (rescanDoneResolve) {
          rescanDoneResolve();
          rescanDoneResolve = null;
        }
      } else if (msg.type === 'component-created') {
        if (componentCreatedResolve) {
          componentCreatedResolve({
            width: msg.width,
            height: msg.height,
            skipped: msg.skipped || false
          });
          componentCreatedResolve = null;
        }
      } else if (msg.type === 'constraints-preview') {
        if (msg.count === 0) {
          log('No constrainable layers found at deepest level', 'warn');
          setUtilsState('idle');
        } else {
          for (const path of msg.paths) {
            log(path, 'info');
          }
          log(`\nFound ${msg.count} layers to modify`, 'info');
          constraintActionBtn.textContent = `Apply to ${msg.count} layers`;
          setUtilsState('preview');
        }
      } else if (msg.type === 'constraint-progress') {
        setProgress((msg.current / msg.total) * 100);
        setStats(`Processed: ${msg.current}/${msg.total} (errors: ${msg.errors})`);
      } else if (msg.type === 'constraints-done') {
        if (msg.errors > 0) {
          log(`\n⚠️ Completed with errors. Processed: ${msg.total}, errors: ${msg.errors}`, 'warn');
        } else {
          log(`\n✅ Done! Processed: ${msg.total}, errors: ${msg.errors}`, 'success');
        }
        setStats(`Processed: ${msg.total}/${msg.total} (errors: ${msg.errors})`);
        setUtilsState('idle');
      }
    };
  </script>
</body>
</html>
